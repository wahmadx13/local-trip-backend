services:
  db:
    image: postgres:16-alpine
    container_name: local-trip-db
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-trip-server
    env_file:
      - ./.env
    environment:
      PORT: ${PORT}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - '${PORT:-5001}:${PORT:-5001}'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
    restart: unless-stopped

  studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-trip-prisma-studio
    command: npm run prisma:studio:exposed
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      STUDIO_PORT: ${STUDIO_PORT}
    ports:
      - '${STUDIO_PORT:-5555}:${STUDIO_PORT:-5555}'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
